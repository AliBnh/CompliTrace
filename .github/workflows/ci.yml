name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: test_complitrace
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      qdrant:
        image: qdrant/qdrant:v1.12.1
        ports:
          - 6333:6333

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Cache pip dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install Python dependencies
        run: |
          pip install -r apps/auth-service/requirements.txt
          pip install -r apps/ingestion-service/requirements.txt
          pip install -r apps/knowledge-service/requirements.txt
          pip install -r apps/orchestration-service/requirements.txt
          pip install ruff==0.15.12 pytest pytest-asyncio httpx pytest-cov

      - name: Lint Python code
        run: |
          ruff check apps/ --exclude apps/frontend/
          ruff format --check apps/ --exclude apps/frontend/

      - name: Run auth-service tests
        working-directory: apps/auth-service
        run: python -m pytest tests/ -v
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_complitrace
          QDRANT_URL: http://localhost:6333

      - name: Run ingestion-service tests
        working-directory: apps/ingestion-service
        run: python -m pytest tests/ -v
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_complitrace
          QDRANT_URL: http://localhost:6333

      - name: Run orchestration-service tests
        working-directory: apps/orchestration-service
        run: python -m pytest tests/ -v --cov=app --cov-report=term-missing
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_complitrace
          QDRANT_URL: http://localhost:6333

  frontend-lint-and-build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: apps/frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install frontend dependencies
        run: npm install

      - name: Lint frontend code
        run: npm run lint

      - name: Build frontend
        run: npm run build



  e2e-tests:
    runs-on: ubuntu-latest
    needs: [lint-and-test, frontend-lint-and-build]

    defaults:
      run:
        working-directory: apps/frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install frontend dependencies
        run: npm install

      - name: Install Playwright
        run: npx playwright install --with-deps chromium

      - name: Verify E2E tests compile
        run: npx playwright test --list
