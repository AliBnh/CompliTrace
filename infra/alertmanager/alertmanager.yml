global:
  resolve_timeout: 5m
  smtp_smarthost: "smtp.gmail.com:587"
  smtp_from: "alerts@complitrace.com"
  smtp_auth_username: "your-email@gmail.com"
  smtp_auth_password: "your-app-password"
  smtp_require_tls: true

route:
  receiver: email-alerts
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 1h

receivers:
  - name: email-alerts
    email_configs:
      - to: "benhima150@gmail.com"
        send_resolved: true

inhibit_rules: []
