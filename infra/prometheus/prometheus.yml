global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s
  external_labels:
    monitor: "complitrace"

rule_files:
  - /etc/prometheus/rules/complitrace-alerts.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

scrape_configs:
  - job_name: ingestion-service
    metrics_path: /metrics
    static_configs:
      - targets: ["ingestion-service:8001"]

  - job_name: knowledge-service
    metrics_path: /metrics
    static_configs:
      - targets: ["knowledge-service:8002"]

  - job_name: orchestration-service
    metrics_path: /metrics
    static_configs:
      - targets: ["orchestration-service:8003"]

  - job_name: auth-service
    metrics_path: /metrics
    static_configs:
      - targets: ["auth-service:8004"]

  - job_name: postgres-exporter
    metrics_path: /metrics
    static_configs:
      - targets: ["postgres-exporter:9187"]

  - job_name: cadvisor
    metrics_path: /metrics
    static_configs:
      - targets: ["cadvisor:8080"]
